<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .book {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .book h3 {
            margin: 0;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: white;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>

<body>

<header>
    <h1>My Book Library</h1>
    <p>Explore your favorite books</p>
</header>

<div class="container">

    <div class="book">
        <h3>Introduction to Algorithms</h3>
        <p>Author: Thomas H. Cormen</p>
    </div>

    <div class="book">
        <h3>Computer Networks</h3>
        <p>Author: Andrew S. Tanenbaum</p>
    </div>

    <div class="book">
        <h3>Discrete Mathematics</h3>
        <p>Author: Kenneth Rosen</p>
    </div>

</div>

<footer>
    <p>© 2026 Book Library</p>
</footer>

<!-- Watson Assistant Chat Embed -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "78a06d6d-ff5c-4e24-bb26-2030179480eb",
    region: "au-syd",
    serviceInstanceID: "42c2a59b-7ad5-4df5-b579-4ba2e5e65c4f",
    onLoad: async (instance) => { await instance.render(); }
  };
  setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" 
        + (window.watsonAssistantChatOptions.clientVersion || 'latest') 
        + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
